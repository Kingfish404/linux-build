# system config: RISC-V 64-bit, Buildroot userspace, QEMU with networking
#
# Build:  make configure SYSTEM=configs/qemu-rv64-buildroot.toml
#         make build
# Test:   make test
#         ssh root@localhost -p 2222

[target]
arch    = "riscv64"
fpu     = true              # Buildroot default ABI is lp64d (hard-float)

[kernel]
version = "6.18.15"

[kernel.config]

[rootfs]
type        = "initramfs"
init        = "busybox"     # busybox → Buildroot-based rootfs
compression = "gzip"

[rootfs.packages]
include = [
    "openssh",
    "wget",
    "strace",
    "htop",
    "lsof",
    "file",
    "tree",
]

[boot]
loader   = "qemu"
memory   = 512
timeout  = 0
ssh_port = 2222             # host port forwarded to guest :22
