# system config: RISC-V 64-bit, minimal initramfs, QEMU
#
# Build:  make configure SYSTEM=configs/qemu-rv64-minimal.toml
#         make build
# Test:   make test

[target]
arch    = "riscv64"         # riscv32 | riscv64
fpu     = false             # true → enable D extension + hard-float ABI

[kernel]
version = "6.18.15"

# Extra kernel config overrides (applied after arch defaults).
# true → CONFIG_FOO=y, false → # CONFIG_FOO is not set, "string" → CONFIG_FOO="string"
[kernel.config]
# MODULES = true            # uncomment when Phase 2 kernel module support lands

[rootfs]
type        = "initramfs"   # initramfs | disk (disk = Phase 1+)
init        = "loop"        # loop | busybox | dinit (dinit = Phase 2+)
compression = "gzip"        # gzip | zstd (zstd = Phase 0 task 0.2)

# Packages to include in rootfs (used when init = "busybox", i.e. Buildroot)
[rootfs.packages]
include = []

[boot]
loader  = "qemu"            # qemu | spike
memory  = 512               # MiB
timeout = 0                 # seconds, 0 = no timeout
